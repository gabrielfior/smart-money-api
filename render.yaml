services:
  - type: web
    name: smart-money-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JUPITER_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false